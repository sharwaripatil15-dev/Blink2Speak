<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History – Recent Used Messages</title>

  <style>
    :root {
      --bg: #f4f5f7;
      --bg-soft: #ffffff;
      --sidebar-bg: #f9fafb;
      --accent: #8ccf23;
      --text-main: #111827;
      --text-muted: #6b7280;
      --border-subtle: #e5e7eb;
      --shadow-soft: 0 18px 40px rgba(15, 23, 42, 0.08);
      --radius-full: 999px;
      --transition-fast: 0.25s ease;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
    }

    body.dark {
      --bg: #020617;
      --bg-soft: #020617;
      --sidebar-bg: #030712;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --border-subtle: #111827;
      --shadow-soft: 0 22px 50px rgba(0, 0, 0, 0.65);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
    }

    .shell {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      width: 100%;
      min-height: 100vh;
      transition: grid-template-columns 0.25s ease;
    }

    /* When menu hidden, sidebar collapses and main is fullscreen */
    .shell.menu-hidden {
      grid-template-columns: 0 minmax(0, 1fr);
    }

    .shell.menu-hidden aside {
      transform: translateX(-260px);
      opacity: 0;
      pointer-events: none;
    }

    /* Sidebar */
    aside {
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border-subtle);
      padding: 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 26px;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-logo {
      width: 36px;
      height: 36px;
      border-radius: 12px;
      background: linear-gradient(135deg, #a3e635, #4ade80);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      color: #022c22;
      box-shadow: 0 12px 26px rgba(132, 204, 22, 0.6);
    }

    .brand-text-main {
      font-size: 17px;
      font-weight: 600;
    }

    .brand-text-sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    .brand-text {
      display: flex;
      flex-direction: column;
    }

    .nav {
      margin-top: 6px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 14px;
      font-size: 14px;
      color: var(--text-muted);
      text-decoration: none;
      cursor: pointer;
      transition:
        background var(--transition-fast),
        color var(--transition-fast),
        transform var(--transition-fast);
    }

    .nav-link-icon {
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #e5f6bf;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #47630b;
      font-size: 13px;
    }

    .nav-link span:last-child {
      flex: 1;
    }

    .nav-link:hover {
      transform: translateY(-1px);
      background: rgba(148, 163, 184, 0.16);
      color: var(--text-main);
    }

    .nav-link.active {
      background: #8ccf23;
      color: #f9fafb;
      font-weight: 600;
    }

    .nav-link.active .nav-link-icon {
      background: #f9fafb;
      color: #8ccf23;
    }

    body.dark .nav-link.active {
      background: #8ccf23;
      color: #022c22;
    }

    /* Main + top bar */
    main {
      display: flex;
      flex-direction: column;
      background: var(--bg-soft);
    }

    .topbar {
      height: 68px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-title {
      font-size: 18px;
      font-weight: 600;
    }

    /* Menu toggle button */
    .menu-toggle {
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: var(--sidebar-bg);
      color: var(--text-main);
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition:
        background var(--transition-fast),
        transform var(--transition-fast);
    }

    .menu-toggle:hover {
      transform: translateY(-1px);
      background: rgba(148, 163, 184, 0.16);
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .clock {
      font-size: 14px;
      color: var(--text-muted);
      padding: 8px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--border-subtle);
      background: rgba(248, 250, 252, 0.9);
    }

    body.dark .clock {
      background: rgba(15, 23, 42, 0.95);
    }

    .theme-toggle {
      border-radius: 999px;
      width: 34px;
      height: 34px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      background: transparent;
      transition:
        transform var(--transition-fast),
        background var(--transition-fast);
    }

    .theme-toggle:hover {
      transform: translateY(-1px);
      background: rgba(148, 163, 184, 0.16);
    }

    /* Content */
    .content {
      padding: 26px 42px 34px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    h1.page-title {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -0.03em;
      margin-bottom: 4px;
    }

    h1.page-title::after {
      content: "";
      display: block;
      width: 80px;
      height: 3px;
      margin: 10px auto 0;
      border-radius: 999px;
      background: linear-gradient(to right, #8ccf23, #4ade80);
    }

    .history-box {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: #ffffff;
      border-radius: 16px;
      padding: 18px 18px 16px;
      border: 1.5px solid #dbeafe;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    body.dark .history-box {
      background: #020617;
      border-color: #111827;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
    }

    .history-item {
      padding: 14px 14px;
      margin-bottom: 10px;
      background: #f8fbff;
      border-radius: 12px;
      border: 1.5px solid #d3ffa6;
      font-size: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: 0.25s ease;
    }

    .history-item:last-child {
      margin-bottom: 0;
    }

    .history-item:hover {
      background: #eff6ff;
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.2);
    }

    body.dark .history-item {
      background: #020617;
      border-color: #2a7f1d;
    }

    body.dark .history-item:hover {
      background: #111827;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.8);
    }

    .time {
      font-size: 13px;
      color: #64748b;
    }

    body.dark .time {
      color: #9ca3af;
    }

    .clear-btn {
      margin: 16px auto 0;
      padding: 10px 22px;
      background: #ef4444;
      border: none;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition:
        background 0.2s ease,
        transform 0.2s ease,
        box-shadow 0.2s ease;
      box-shadow: 0 10px 20px rgba(248, 145, 113, 0.4);
    }

    .clear-btn:hover {
      background: #35dc26;
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(127, 248, 113, 0.6);
    }

    .empty-state {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      padding: 6px 0 2px;
    }

    @media (max-width: 960px) {
      .shell {
        grid-template-columns: 70px minmax(0, 1fr);
      }
      .brand-text {
        display: none;
      }
      .nav-link span:last-child {
        display: none;
      }
    }

    @media (max-width: 720px) {
      .shell {
        grid-template-columns: minmax(0, 1fr);
      }
      aside {
        display: none;
      }
      .content {
        padding: 22px 18px 30px;
      }
      .history-box {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <!-- Sidebar -->
 
      <aside>
      <div class="brand">
        <div class="brand-logo">E</div>
        <div class="brand-text">
          <span class="brand-text-main">Blink2Speak</span>
          <span class="brand-text-sub">EyeVoice</span>
        </div>
      </div>

      <nav class="nav">
        <a href="index.html" class="nav-link">
          <div class="nav-link-icon">🏠</div>
          <span>Home</span>
        </a>
        <a href="asepcaminput.html" class="nav-link">
          <div class="nav-link-icon">👁️</div>
          <span>Blink-2-Speak</span>
        </a>
         </a>
         <a href="pressconvert.html" class="nav-link">
          <div class="nav-link-icon">⏱️</div>
          <span>Tab-2-Speak</span>
        </a>

        
        <a class="nav-link active">
          <div class="nav-link-icon">⏱️</div>
          <span>History</span>
        </a>
        <a href="asepsavedmsg.html" class="nav-link">
          <div class="nav-link-icon">💾</div>
          <span>Saved Messages</span></a>
        <a href="learnmorsecode.html" class="nav-link">
          <div class="nav-link-icon">📘</div>
          <span>Morse Code</span>
        </a>
        <a href="asepinfo.html" class="nav-link">
          <div class="nav-link-icon">📘</div>
          <span>User Guide</span>
        </a>
         <a href="asepsettingin.html" class="nav-link">
          <div class="nav-link-icon">⚙️</div>
          <span>Settings</span>
        </a>
        
      </nav>
    </aside>
    <!-- Main -->
    <main>
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="menuToggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
          <div class="topbar-title">History</div>
        </div>
        <div class="topbar-right">
          <div id="clock" class="clock">--:--:--</div>
          <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
            <span id="themeIcon">🌙</span>
          </button>
        </div>
      </header>

      <!-- Content -->
      <section class="content">
        <h1 class="page-title">History – Recently Used Messages</h1>

        <div class="history-box">
          <div id="historyList"></div>
          <p id="emptyState" class="empty-state" style="display:none;">
            No messages in history yet.
          </p>
          <button id="clearBtn" class="clear-btn">
            🧹 Clear history
          </button>
        </div>
      </section>
    </main>
  </div>

  <script>
    // Sidebar menu toggle (fullscreen mode)
    const shell = document.querySelector(".shell");
    const menuToggle = document.getElementById("menuToggle");

    menuToggle.addEventListener("click", () => {
      shell.classList.toggle("menu-hidden");
    });

    // Live clock
    function updateClock() {
      const el = document.getElementById("clock");
      const now = new Date();
      const timeStr = now.toLocaleTimeString("en-IN", {
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: true,
      });
      el.textContent = timeStr.toLowerCase();
    }
    updateClock();
    setInterval(updateClock, 1000);

    // Theme toggle shared via localStorage [web:69]
    const body = document.body;
    const toggleBtn = document.getElementById("themeToggle");
    const iconSpan = document.getElementById("themeIcon");

    function applyTheme(theme) {
      if (theme === "dark") {
        body.classList.add("dark");
        iconSpan.textContent = "☀️";
      } else {
        body.classList.remove("dark");
        iconSpan.textContent = "🌙";
      }
    }

    const savedTheme = localStorage.getItem("eyev_theme");
    const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const initialTheme = savedTheme || (prefersDark ? "dark" : "light");
    applyTheme(initialTheme);

    toggleBtn.addEventListener("click", () => {
      const newTheme = body.classList.contains("dark") ? "light" : "dark";
      localStorage.setItem("eyev_theme", newTheme);
      applyTheme(newTheme);
    });

    // History functionality
    const HISTORY_KEY = "eyev_history";

    function loadHistory() {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveHistory(items) {
      localStorage.setItem(HISTORY_KEY, JSON.stringify(items));
    }

    function timeAgo(ms) {
      const now = Date.now();
      const diff = Math.max(0, now - ms);
      const seconds = Math.floor(diff / 1000);
      const minutes = Math.floor(seconds / 60);
      const hours = Math.floor(minutes / 60);

      if (minutes < 1) return "just now";
      if (minutes < 60) return minutes + " min ago";
      if (hours < 24) return hours + " hr ago";
      const days = Math.floor(hours / 24);
      return days + (days === 1 ? " day ago" : " days ago");
    }

    const historyListEl = document.getElementById("historyList");
    const emptyStateEl = document.getElementById("emptyState");
    const clearBtn = document.getElementById("clearBtn");

    function renderHistory() {
      const items = loadHistory().sort((a, b) => b.timestamp - a.timestamp);
      historyListEl.innerHTML = "";

      if (!items.length) {
        emptyStateEl.style.display = "block";
        return;
      }
      emptyStateEl.style.display = "none";

      items.forEach((item) => {
        const row = document.createElement("div");
        row.className = "history-item";

        const spanText = document.createElement("span");
        spanText.textContent = item.text;

        const spanTime = document.createElement("span");
        spanTime.className = "time";
        spanTime.textContent = timeAgo(item.timestamp);

        row.appendChild(spanText);
        row.appendChild(spanTime);
        historyListEl.appendChild(row);
      });
    }

    clearBtn.addEventListener("click", () => {
      saveHistory([]);
      renderHistory();
    });

    // Demo data if empty
    if (!loadHistory().length) {
      saveHistory([
        { text: "🚨 I need help",   timestamp: Date.now() - 2  * 60 * 1000 },
        { text: "🥤 I am thirsty",  timestamp: Date.now() - 5  * 60 * 1000 },
        { text: "🙏 Thank you",     timestamp: Date.now() - 10 * 60 * 1000 },
        { text: "🧑‍⚕️ Call doctor", timestamp: Date.now() - 15 * 60 * 1000 },
      ]);
    }

    renderHistory();
    /* ================= TEXT TO SPEECH FOR HISTORY ================= */

function speakText(text) {
  if (!text) return;

  // Stop any ongoing speech
  window.speechSynthesis.cancel();

  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "en-IN";
  utterance.rate = 0.9;
  utterance.pitch = 1;
  utterance.volume = 1;

  window.speechSynthesis.speak(utterance);
}

/* Click to speak history item */
historyListEl.addEventListener("click", (e) => {
  const row = e.target.closest(".history-item");
  if (!row) return;

  // Get only message text (ignore time)
  const messageText = row.querySelector("span")?.textContent || "";

  // Remove emojis for clean speech
  const cleanText = messageText.replace(
    /[\p{Emoji_Presentation}\p{Extended_Pictographic}]/gu,
    ""
  ).trim();

  speakText(cleanText);
});

  </script>
</body>
</html>
